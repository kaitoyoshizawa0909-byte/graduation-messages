<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>林憲生へ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100dvh;overflow:hidden;background:#08060a;color:#fff;}
canvas{position:fixed;inset:0;pointer-events:none;}
#c-amb{z-index:1;}#c-main{z-index:2;}#c-dots{z-index:3;}
#tap-ov{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.88);cursor:pointer;transition:opacity 0.6s ease;}
#tap-inner{text-align:center;user-select:none;}
#tap-label{font-family:'Share Tech Mono',monospace;font-size:clamp(0.75rem,3.5vw,1.1rem);letter-spacing:0.45em;color:#c8a96e;animation:tpulse 1.6s ease-in-out infinite;}
#tap-name{font-family:'Shippori Mincho',serif;font-size:clamp(1.4rem,8vw,3rem);font-weight:800;letter-spacing:0.15em;color:rgba(255,255,255,0.2);margin-top:0.7rem;}
@keyframes tpulse{0%,100%{opacity:0.4}50%{opacity:1}}
#overlay{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
#title-block{opacity:0;text-align:center;padding:0 1.5rem;}
#title-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(0.5rem,2vw,0.7rem);letter-spacing:0.5em;color:#c8a96e;margin-bottom:1rem;}
#title-name{font-family:'Shippori Mincho',serif;font-size:clamp(2.8rem,16vw,6.5rem);font-weight:800;letter-spacing:0.1em;line-height:1;overflow:hidden;}
#title-name-inner{display:block;transform:translateY(110%);transition:transform 0.7s cubic-bezier(0.22,1,0.36,1);}
#title-bar{display:block;width:0;height:1px;background:linear-gradient(90deg,transparent,#c8a96e,transparent);margin:0.8rem auto;max-width:180px;transition:width 0.6s ease 0.3s;}
#title-from{font-family:'Share Tech Mono',monospace;font-size:clamp(0.4rem,1.8vw,0.6rem);letter-spacing:0.45em;color:rgba(255,255,255,0.28);margin-top:0.3rem;opacity:0;transition:opacity 0.6s ease 0.6s;}
#final-block{opacity:0;display:flex;flex-direction:column;align-items:center;gap:1rem;transition:opacity 0.8s ease;text-align:center;padding:0 1.5rem;}
#final-name{font-family:'Shippori Mincho',serif;font-size:clamp(2.2rem,11vw,4.5rem);font-weight:800;letter-spacing:0.12em;color:#fff;text-shadow:0 0 40px #c8a96e88;opacity:0;transform:translateY(16px);transition:opacity 0.7s ease,transform 0.7s cubic-bezier(0.22,1,0.36,1);}
#final-msg{font-family:'Shippori Mincho',serif;font-size:clamp(0.9rem,4.5vw,1.4rem);font-weight:400;letter-spacing:0.15em;color:#f5e6c8;text-shadow:0 0 20px #f5e6c888;opacity:0;transform:translateY(12px);transition:opacity 0.7s ease 0.25s,transform 0.7s ease 0.25s;}
#final-from{font-family:'Share Tech Mono',monospace;font-size:clamp(1.4rem,5.5vw,1.9rem);letter-spacing:0.35em;color:rgba(255,255,255,0.45);opacity:0;transition:opacity 0.7s ease 0.6s;}
#flash{position:fixed;inset:0;z-index:55;pointer-events:none;background:#fff;opacity:0;transition:opacity 0.25s;}
#scan{position:fixed;inset:0;z-index:15;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);}

#back-btn{
  display:inline-block;
  margin-top:2.2rem;
  padding:0.6em 2em;
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.9rem,3.5vw,1.1rem);
  letter-spacing:0.2em;
  color:rgba(255,255,255,0.7);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:999px;
  background:rgba(255,255,255,0.07);
  cursor:pointer;
  text-decoration:none;
  opacity:0;
  pointer-events:auto;
  position:relative;
  z-index:60;
  transition:opacity 0.8s ease 1s, background 0.2s;
  -webkit-tap-highlight-color:transparent;
}
#back-btn:hover,#back-btn:active{background:rgba(255,255,255,0.18);}
</style>
</head>
<body>
<canvas id="c-amb"></canvas><canvas id="c-main"></canvas><canvas id="c-dots"></canvas>
<div id="scan"></div><div id="flash"></div>
<div id="tap-ov">
  <div id="tap-inner">
    <div id="tap-label">▶ &nbsp; TAP TO PLAY &nbsp; ◀</div>
    <div id="tap-name">林憲生 へ</div>
  </div>
</div>
<div id="overlay">
  <div id="title-block">
    <div id="title-sub">— MESSAGE —</div>
    <div id="title-name"><div id="title-name-inner">林憲生</div></div>
    <span id="title-bar"></span>
    <div id="title-from">FROM &nbsp; YOSHY</div>
  </div>
  <div id="final-block">
    <div id="final-name">林憲生</div>
    <div id="final-msg">もみじまんじゅうがお土産で1番うまい</div>
    <div id="final-from">✦ &nbsp; Yoshy &nbsp; ✦</div>
    <a id="back-btn" href="index.html">← もどる</a>
  </div>
</div>
<canvas id="c-game" style="position:fixed;inset:0;z-index:40;pointer-events:auto;display:none;cursor:crosshair;"></canvas>
<div id="game-ui" style="position:fixed;inset:0;z-index:45;display:none;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:8vh;pointer-events:none;">
  <div style="font-family:'Share Tech Mono',monospace;font-size:clamp(0.55rem,2.5vw,0.82rem);letter-spacing:0.3em;color:#c8a96e;margin-bottom:0.7rem;opacity:0.85;">🖌 ゾーンでキープしろ！</div>
  <div style="display:flex;align-items:baseline;gap:0.25rem;">
    <span id="g-count" style="font-family:'Shippori Mincho',serif;font-size:clamp(2.2rem,11vw,3.5rem);font-weight:800;line-height:1;color:#fff;">6</span>
    <span style="font-family:'Shippori Mincho',serif;font-size:clamp(0.9rem,4vw,1.3rem);color:rgba(255,255,255,0.6);">残り</span>
  </div>
  <div style="width:min(220px,52vw);height:3px;background:rgba(255,255,255,0.15);border-radius:2px;margin-top:0.9rem;overflow:hidden;">
    <div id="g-fill" style="height:100%;width:0%;background:#c8a96e;border-radius:2px;transition:width 0.18s ease;"></div>
  </div>
</div>
<div id="game-clear" style="position:fixed;inset:0;z-index:46;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:clamp(1.8rem,9vw,3.2rem);letter-spacing:0.5em;color:#fff;opacity:0;pointer-events:none;transition:opacity 0.3s;text-shadow:0 0 35px #c8a96e;">✦ CLEAR! ✦</div>
<script>

const gcEl=document.getElementById('c-game');const gc=gcEl.getContext('2d');
gcEl.width=window.innerWidth;gcEl.height=window.innerHeight;
const gcW=gcEl.width,gcH=gcEl.height;
const MX=gcW/2,MY=gcH/2;
const TOTAL=5;
const TZ_W_BASE=0.18; const TZ_W_MIN=0.06;
const HOLD_SECS=3.0;
const FILL_SPEED=0.011;   // rises when held
const DRAIN_SPEED=0.011;  // falls when released (symmetric = balanced by rhythm)
const PROG_SPEED=1/(HOLD_SECS*60);  // progress per frame in zone
const PROG_DRAIN=PROG_SPEED*0.4;    // slowly drains when out of zone

let gRunning=false,gHolding=false,gFill=0,gProgress=0,gScore=0,gWaiting=false;
let gTzCenter=0.5;
let gFeedback='',gFbTimer=0,gRafId=0;

const BH=gcH*0.48,BW=20;
const BX=MX+gcW*0.24,BY=MY-BH/2;

function gCurrentTzW(){ return Math.max(TZ_W_MIN, TZ_W_BASE - gScore*(TZ_W_BASE-TZ_W_MIN)/(TOTAL-1)); }
function gRandTarget(){
  const w=gCurrentTzW();
  gTzCenter=w/2+0.10+Math.random()*(1-w-0.20);
  gProgress=0; gFill=0; gWaiting=false;
}
function gInZone(){ const w=gCurrentTzW(); return gFill>=gTzCenter-w/2 && gFill<=gTzCenter+w/2; }

function gDraw(){
  if(!gRunning)return;

  // Move fill
  if(gHolding) gFill=Math.min(1,gFill+FILL_SPEED);
  else         gFill=Math.max(0,gFill-DRAIN_SPEED);

  // Progress: accumulates ONLY while inside zone (no hold required — just be there)
  const inZone=gInZone();
  if(inZone&&!gWaiting){
    gProgress=Math.min(1,gProgress+PROG_SPEED);
    if(gProgress>=1){
      gWaiting=true; gProgress=0;
      gScore++;
      chord([440,554,659,880],'sine',0,0.7,0.12);
      gFeedback='キープ！';gFbTimer=45;
      document.getElementById('g-count').textContent=Math.max(0,TOTAL-gScore);
      document.getElementById('g-fill').style.width=(gScore/TOTAL*100)+'%';
      if(gScore>=TOTAL){gRunning=false;chord([523,659,784,1047],'sine',0,1.2,0.12);for(let i=0;i<5;i++)pt(1047+i*130,'sine',i*0.07,0.8,0.07);doFlash(140,'#c8a96e');document.getElementById('game-clear').style.opacity='1';setTimeout(()=>{['game-ui','c-game','game-clear'].forEach(id=>{const el=document.getElementById(id);el.style.transition='opacity 0.6s';el.style.opacity='0';});setTimeout(()=>{['game-ui','c-game','game-clear'].forEach(id=>document.getElementById(id).style.display='none');run();},680);},950);return;}
      setTimeout(()=>gRandTarget(),500);
    }
  } else {
    gProgress=Math.max(0,gProgress-PROG_DRAIN);
  }

  gc.clearRect(0,0,gcW,gcH);

  // Ink blob
  const blobR=gcW*0.14*(0.4+gFill*0.65);
  gc.globalAlpha=0.8;
  const g2=gc.createRadialGradient(MX,MY,0,MX,MY,blobR);
  g2.addColorStop(0,'#3a2a10');g2.addColorStop(0.7,'#c8a96e');g2.addColorStop(1,'rgba(200,169,110,0)');
  gc.fillStyle=g2;gc.beginPath();gc.arc(MX,MY,blobR,0,Math.PI*2);gc.fill();

  // Progress arc around blob
  if(gProgress>0){
    gc.globalAlpha=0.85;
    gc.strokeStyle=inZone?'#76ff03':'rgba(118,255,3,0.4)';
    gc.lineWidth=5;
    gc.beginPath();
    gc.arc(MX,MY,blobR+10,-Math.PI/2,-Math.PI/2+gProgress*Math.PI*2);
    gc.stroke();
    if(inZone&&gProgress>0&&Math.floor(gProgress*HOLD_SECS*60)%60===0)
      pt(660+gScore*60,'sine',0,0.1,0.06);
  }

  // Vertical meter bar
  gc.globalAlpha=0.2;gc.fillStyle='#c8a96e';
  gc.beginPath();gc.roundRect(BX,BY,BW,BH,BW/2);gc.fill();

  // Target zone
  const _tzw=gCurrentTzW();
  const tzY=BY+BH*(1-(gTzCenter+_tzw/2));
  const tzH=BH*_tzw;
  gc.globalAlpha=inZone?0.85:0.55;gc.fillStyle='#76ff03';
  gc.beginPath();gc.roundRect(BX,tzY,BW,tzH,BW/2);gc.fill();

  // Fill level
  gc.globalAlpha=0.9;gc.fillStyle=inZone?'#76ff03':'#c8a96e';
  gc.beginPath();gc.roundRect(BX,BY+BH*(1-gFill),BW,BH*gFill,BW/2);gc.fill();

  // Hint
  const hint=inZone?'そこをキープ！':gHolding?'離せ！':'押し続けろ';
  gc.globalAlpha=0.55+(gHolding?0:0.3*Math.abs(Math.sin(Date.now()*0.004)));
  gc.fillStyle='#fff';gc.font=`${Math.round(gcW*0.038)}px 'Share Tech Mono',monospace`;
  gc.textAlign='center';gc.textBaseline='middle';
  gc.fillText(hint,MX,MY+gcH*0.26);

  // Round
  gc.globalAlpha=0.6;gc.font=`${Math.round(gcW*0.032)}px 'Share Tech Mono',monospace`;
  gc.fillText(`${gScore+1} / ${TOTAL}`,MX,MY-gcH*0.26);

  // Feedback
  if(gFbTimer>0){gFbTimer--;
    gc.globalAlpha=gFbTimer/45;
    gc.font=`bold ${Math.round(gcW*0.1)}px 'Shippori Mincho',serif`;
    gc.fillStyle='#76ff03';gc.textAlign='center';gc.textBaseline='middle';
    gc.fillText(gFeedback,MX,MY);
  }
  gc.globalAlpha=1;
  gRafId=requestAnimationFrame(gDraw);
}

function gPress(){if(!gRunning)return;gHolding=true;sw(200,400,'sine',0,0.08,0.1);}
function gRelease(){if(!gRunning||!gHolding)return;gHolding=false;}
gcEl.addEventListener('mousedown',e=>{e.preventDefault();gPress();});
gcEl.addEventListener('mouseup',gRelease);
gcEl.addEventListener('touchstart',e=>{e.preventDefault();gPress();},{passive:false});
gcEl.addEventListener('touchend',e=>{e.preventDefault();gRelease();},{passive:false});
function startGame(){
  gRunning=true;gRandTarget();
  document.getElementById('game-ui').style.display='flex';
  document.getElementById('g-count').textContent=TOTAL;
  gcEl.style.display='block';
  gDraw();
}

const W=()=>window.innerWidth,H=()=>window.innerHeight;
const delay=ms=>new Promise(r=>setTimeout(r,ms));
function ease(t){return t<0.5?2*t*t:1-(-2*t+2)**2/2;}
function lerp(a,b,t){return a+(b-a)*t;}
const flashEl=document.getElementById('flash');
function doFlash(dur=80,color='#fff'){
  flashEl.style.transition='opacity 0s';flashEl.style.background=color;flashEl.style.opacity='0.85';
  setTimeout(()=>{flashEl.style.transition='opacity 0.25s';flashEl.style.opacity='0';},dur);
}

let _ctx=null;
function aC(){if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();return _ctx;}
function mkNoise(c,dur){const b=c.createBuffer(1,Math.ceil(c.sampleRate*(dur+0.1)),c.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const s=c.createBufferSource();s.buffer=b;return s;}
function pt(freq,type,delay,dur,vol,dst){const c=aC(),now=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type=type||'sine';o.frequency.setValueAtTime(freq,now+delay);g.gain.setValueAtTime(0.001,now+delay);g.gain.linearRampToValueAtTime(vol||0.18,now+delay+0.018);g.gain.exponentialRampToValueAtTime(0.0001,now+delay+dur);o.connect(g);g.connect(dst||c.destination);o.start(now+delay);o.stop(now+delay+dur+0.1);}
function pn(delay,dur,vol,freq,q,dst){const c=aC(),now=c.currentTime,s=mkNoise(c,dur),f=c.createBiquadFilter(),g=c.createGain();f.type='bandpass';f.frequency.value=freq||800;f.Q.value=q||1;g.gain.setValueAtTime(0.001,now+delay);g.gain.linearRampToValueAtTime(vol||0.12,now+delay+0.03);g.gain.exponentialRampToValueAtTime(0.0001,now+delay+dur);s.connect(f);f.connect(g);g.connect(dst||c.destination);s.start(now+delay);}
function sw(f1,f2,type,delay,dur,vol,dst){const c=aC(),now=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type=type||'sine';o.frequency.setValueAtTime(f1,now+delay);o.frequency.exponentialRampToValueAtTime(f2,now+delay+dur);g.gain.setValueAtTime(vol||0.18,now+delay);g.gain.exponentialRampToValueAtTime(0.0001,now+delay+dur+0.05);o.connect(g);g.connect(dst||c.destination);o.start(now+delay);o.stop(now+delay+dur+0.1);}
function chord(freqs,type,delay,dur,vol){freqs.forEach((f,i)=>pt(f,type||'sine',delay+i*0.04,dur,vol||0.12));}
function impact(delay,lowVol,midVol){const c=aC(),now=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(80,now+delay);o.frequency.exponentialRampToValueAtTime(30,now+delay+0.15);g.gain.setValueAtTime(lowVol||0.3,now+delay);g.gain.exponentialRampToValueAtTime(0.001,now+delay+0.25);o.connect(g);g.connect(c.destination);o.start(now+delay);o.stop(now+delay+0.3);pn(delay,0.08,midVol||0.2,200,0.8);}


const snd={
  title:()=>{
    // Wooden block knock + shakuhachi-like breath tone
    pn(0,0.04,0.35,800,8);     // wood knock
    sw(330,280,'sine',0.06,1.5,0.12);  // breath tone descending
    pt(220,'sine',0.08,2.0,0.08);
  },
  crash:()=>{ impact(0,0.3,0.2); pn(0,0.2,0.1,200,0.5); },
  dots:()=>{ pn(0,0.6,0.08,500,0.4); sw(400,200,'sine',0,0.5,0.07); },
  particle:()=>{
    // Ink spreading in water - very low resonant tones, slow
    pt(110,'sine',0,5,0.12);          // deep drone
    pt(165,'sine',0.1,4.5,0.08);      // fifth above
    pn(0,5,0.06,200,0.3);             // water noise
    // Ink drop plops at different times
    [0.3,0.9,1.6,2.4,3.2].forEach(d=>{
      sw(600,80,'sine',d,0.2,0.15);   // drop
      pt(220,'sine',d+0.02,0.8,0.07); // resonance ring
    });
    // Final ink bleed - spreading silence
    pn(3.5,2,0.04,150,0.2);
  },
  reveal:()=>{
    // Zen temple bell - pure harmonics
    pt(440,'sine',0,4.0,0.18);
    pt(880,'sine',0.04,3.0,0.1);
    pt(1320,'sine',0.07,2.0,0.06);
    pt(330,'sine',0.06,4.0,0.09);
  }
};
const sc=document.getElementById('c-amb');const sx=sc.getContext('2d');
sc.width=W();sc.height=H();let starAlpha=0;

// Ink ripple circles
const inkRips=[];let inkT=0;
function drawAmbient(){
  sx.clearRect(0,0,sc.width,sc.height);
  inkT++;
  if(inkT%90===0) inkRips.push({x:Math.random()*sc.width,y:Math.random()*sc.height,r:0,a:0.35});
  for(let i=inkRips.length-1;i>=0;i--){
    const r=inkRips[i]; r.r+=0.7; r.a-=0.004;
    if(r.a<=0){inkRips.splice(i,1);continue;}
    sx.globalAlpha=r.a*starAlpha;
    sx.strokeStyle='#c8a96e'; sx.lineWidth=0.8;
    sx.beginPath(); sx.arc(r.x,r.y,r.r,0,Math.PI*2); sx.stroke();
  }
  requestAnimationFrame(drawAmbient);

function drawPhoto(ctx,alpha,offsetY=0){
  const cw=ctx.canvas.width,ch=ctx.canvas.height,iw=img.naturalWidth,ih=img.naturalHeight;
  const scale=Math.max(cw/iw,ch/ih)*0.9,dw=iw*scale,dh=ih*scale;
  ctx.save();ctx.globalAlpha=alpha;ctx.filter='saturate(0.55) brightness(0.58)';
  ctx.drawImage(img,(cw-dw)/2,(ch-dh)/2+offsetY,dw,dh);ctx.filter='none';
  const gr=ctx.createRadialGradient(cw/2,ch/2,ch*0.15,cw/2,ch/2,ch*0.85);
  gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,'rgba(0,0,0,0.9)');
  ctx.globalAlpha=1;ctx.fillStyle=gr;ctx.fillRect(0,0,cw,ch);ctx.restore();
}
async function run(){
  snd.title();
  const tb=document.getElementById('title-block');
  tb.style.opacity='1'; await delay(60);
  document.getElementById('title-name-inner').style.transform='translateY(0)';
  doFlash(60,'#c8a96e'); await delay(350);
  document.getElementById('title-bar').style.width='140px';
  document.getElementById('title-from').style.opacity='1';
  await delay(1100);
  tb.style.transition='opacity 0.35s ease,transform 0.35s ease';
  tb.style.opacity='0';tb.style.transform='translateY(-28px)';
  await delay(350);tb.style.display='none';
  mc.width=W();mc.height=H();
  await new Promise(res=>{
    let t=0;function f(){t+=0.05;mx.clearRect(0,0,mc.width,mc.height);
      drawPhoto(mx,Math.min(t*2,1),(1-ease(Math.min(t,1)))*(-mc.height*0.35));
      if(t>=1){res();return;}requestAnimationFrame(f);}f();
  });
  snd.crash();doFlash(90);await delay(700);
  const cw=mc.width,ch=mc.height,CX=cw/2,CY=ch/2;
  const off=document.createElement('canvas');off.width=cw;off.height=ch;
  const ox2=off.getContext('2d');drawPhoto(ox2,1,0);
  const id=ox2.getImageData(0,0,cw,ch);
  const COLS=40,ROWS=Math.round(40*ch/cw);
  const dots=[];
  for(let row=0;row<ROWS;row++)for(let col=0;col<COLS;col++){
    const px=Math.round(col/COLS*cw),py=Math.round(row/ROWS*ch),i=(py*cw+px)*4;
    if(id.data[i+3]<20)continue;
    dots.push({x:px,y:py,ox:px,oy:py,r:1.8+Math.random()*1.5,cr:id.data[i],cg:id.data[i+1],cb:id.data[i+2],vx:0,vy:0,angle:0,dist:0});
  }
  snd.dots();
  await new Promise(res=>{
    let t=0;function f(){t+=0.04;
      mx.clearRect(0,0,cw,ch);drawPhoto(mx,1-ease(Math.min(t,1)),0);
      dx.clearRect(0,0,cw,ch);const show=ease(Math.min(t*1.3,1));
      dots.forEach(d=>{dx.globalAlpha=show;dx.beginPath();dx.arc(d.x,d.y,d.r,0,Math.PI*2);dx.fillStyle=`rgb(${d.cr},${d.cg},${d.cb})`;dx.fill();});
      if(t>=1){mx.clearRect(0,0,cw,ch);res();return;}requestAnimationFrame(f);}f();
  });
  await delay(300);
  
  snd.particle();
  // INK WASH: dots bleed outward slowly like ink in water, then dissolve
  dots.forEach(d=>{
    const a=Math.atan2(d.oy-CY,d.ox-CX);
    const baseDist=Math.sqrt((d.ox-CX)**2+(d.oy-CY)**2);
    // slow outward drift + small random walk
    const spread=0.3+Math.random()*0.8;
    d.vx=Math.cos(a)*spread; d.vy=Math.sin(a)*spread;
    d.wx=(Math.random()-0.5)*0.3; d.wy=(Math.random()-0.5)*0.3;
    d.bleed=0; // bleed progress 0-1
  });
  await new Promise(res=>{
    let t=0;
    function f(){
      t+=0.012; dx.clearRect(0,0,cw,ch);
      dots.forEach(d=>{
        d.x+=d.vx+d.wx; d.y+=d.vy+d.wy;
        d.vx*=0.992; d.vy*=0.992; // slow drag
        d.wx+=(Math.random()-0.5)*0.04; d.wy+=(Math.random()-0.5)*0.04; // diffuse walk
        d.wx*=0.95; d.wy*=0.95;
        const dist=Math.sqrt((d.x-CX)**2+(d.y-CY)**2);
        d.bleed=Math.min(1,t/3.5);
        // Ink color: original → sepia → near-transparent
        const inkR=Math.round(lerp(d.cr,200,d.bleed));
        const inkG=Math.round(lerp(d.cg,160,d.bleed));
        const inkB=Math.round(lerp(d.cb,100,d.bleed));
        const fadeOut=t>3.0?Math.max(0,1-(t-3.0)/2.5):1;
        dx.globalAlpha=(0.7-d.bleed*0.4)*fadeOut;
        dx.fillStyle=`rgb(${inkR},${inkG},${inkB})`;
        dx.beginPath();
        // Irregular ink blob shape
        dx.arc(d.x,d.y,d.r*(1+d.bleed*1.2),0,Math.PI*2);
        dx.fill();
        // Ink feather - tiny spread
        if(d.bleed>0.3){
          dx.globalAlpha=0.15*fadeOut*(d.bleed-0.3);
          dx.beginPath(); dx.arc(d.x+d.wx*2,d.y+d.wy*2,d.r*2,0,Math.PI*2); dx.fill();
        }
      });
      starAlpha=Math.min(t*0.4,1);
      if(t>5.5){ dx.clearRect(0,0,cw,ch); res(); return; }
      requestAnimationFrame(f);
    } f();
  });

  await delay(500);
  document.getElementById('final-from').style.opacity='1';
  setTimeout(()=>{const b=document.getElementById('back-btn');if(b)b.style.opacity='1';},1400);
  await delay(700);
  await new Promise(res=>{
    let t=0;function f(){t+=0.012;mx.clearRect(0,0,cw,ch);
      const iw=img.naturalWidth,ih=img.naturalHeight,scale=Math.max(cw/iw,ch/ih)*0.9,dw=iw*scale,dh=ih*scale;
      mx.save();mx.globalAlpha=ease(Math.min(t,1))*0.3;mx.filter='saturate(0.4) brightness(0.5)';
      mx.drawImage(img,(cw-dw)/2,(ch-dh)/2,dw,dh);mx.filter='none';
      const gr=mx.createRadialGradient(cw/2,ch/2,ch*0.1,cw/2,ch/2,ch*0.9);
      gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,'rgba(0,0,0,0.95)');
      mx.globalAlpha=1;mx.fillStyle=gr;mx.fillRect(0,0,cw,ch);mx.restore();
      if(t>=1){res();return;}requestAnimationFrame(f);}f();
  });
}
const tapOv=document.getElementById('tap-ov');
function startAll(){
  tapOv.style.opacity='0';
  setTimeout(()=>tapOv.style.display='none',600);
  startGame();
}
tapOv.addEventListener('click',startAll,{once:true});
tapOv.addEventListener('touchend',e=>{e.preventDefault();startAll();},{once:true,passive:false});
</script>
