<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>一尾周策へ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100dvh;overflow:hidden;background:#000000;color:#fff;}
canvas{position:fixed;inset:0;pointer-events:none;}
#c-amb{z-index:1;}#c-main{z-index:2;}#c-dots{z-index:3;}
#tap-ov{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.88);cursor:pointer;transition:opacity 0.6s ease;}
#tap-inner{text-align:center;user-select:none;}
#tap-label{font-family:'Share Tech Mono',monospace;font-size:clamp(0.75rem,3.5vw,1.1rem);letter-spacing:0.45em;color:#ffd700;animation:tpulse 1.6s ease-in-out infinite;}
#tap-name{font-family:'Shippori Mincho',serif;font-size:clamp(1.4rem,8vw,3rem);font-weight:800;letter-spacing:0.15em;color:rgba(255,255,255,0.2);margin-top:0.7rem;}
@keyframes tpulse{0%,100%{opacity:0.4}50%{opacity:1}}
#overlay{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
#title-block{opacity:0;text-align:center;padding:0 1.5rem;}
#title-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(0.5rem,2vw,0.7rem);letter-spacing:0.5em;color:#ffd700;margin-bottom:1rem;}
#title-name{font-family:'Shippori Mincho',serif;font-size:clamp(2.8rem,16vw,6.5rem);font-weight:800;letter-spacing:0.1em;line-height:1;overflow:hidden;}
#title-name-inner{display:block;transform:translateY(110%);transition:transform 0.7s cubic-bezier(0.22,1,0.36,1);}
#title-bar{display:block;width:0;height:1px;background:linear-gradient(90deg,transparent,#ffd700,transparent);margin:0.8rem auto;max-width:180px;transition:width 0.6s ease 0.3s;}
#title-from{font-family:'Share Tech Mono',monospace;font-size:clamp(0.4rem,1.8vw,0.6rem);letter-spacing:0.45em;color:rgba(255,255,255,0.28);margin-top:0.3rem;opacity:0;transition:opacity 0.6s ease 0.6s;}
#final-block{opacity:0;display:flex;flex-direction:column;align-items:center;gap:1rem;transition:opacity 0.8s ease;text-align:center;padding:0 1.5rem;}
#final-name{font-family:'Shippori Mincho',serif;font-size:clamp(2.2rem,11vw,4.5rem);font-weight:800;letter-spacing:0.12em;color:#fff;text-shadow:0 0 40px #ffd70088;opacity:0;transform:translateY(16px);transition:opacity 0.7s ease,transform 0.7s cubic-bezier(0.22,1,0.36,1);}
#final-msg{font-family:'Shippori Mincho',serif;font-size:clamp(0.9rem,4.5vw,1.4rem);font-weight:400;letter-spacing:0.15em;color:#ffffff;text-shadow:0 0 20px #ffffff88;opacity:0;transform:translateY(12px);transition:opacity 0.7s ease 0.25s,transform 0.7s ease 0.25s;}
#final-from{font-family:'Share Tech Mono',monospace;font-size:clamp(1.4rem,5.5vw,1.9rem);letter-spacing:0.35em;color:rgba(255,255,255,0.45);opacity:0;transition:opacity 0.7s ease 0.6s;}
#flash{position:fixed;inset:0;z-index:20;pointer-events:none;background:#fff;opacity:0;transition:opacity 0.25s;}
#scan{position:fixed;inset:0;z-index:15;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);}
</style>
</head>
<body>
<canvas id="c-amb"></canvas><canvas id="c-main"></canvas><canvas id="c-dots"></canvas>
<div id="scan"></div><div id="flash"></div>
<div id="tap-ov">
  <div id="tap-inner">
    <div id="tap-label">▶ &nbsp; TAP TO PLAY &nbsp; ◀</div>
    <div id="tap-name">一尾周策 へ</div>
  </div>
</div>
<div id="overlay">
  <div id="title-block">
    <div id="title-sub">— MESSAGE —</div>
    <div id="title-name"><div id="title-name-inner">一尾周策</div></div>
    <span id="title-bar"></span>
    <div id="title-from">FROM &nbsp; YOSHY</div>
  </div>
  <div id="final-block">
    <div id="final-name">一尾周策</div>
    <div id="final-msg">Hollywood</div>
    <div id="final-from">✦ &nbsp; Yoshy &nbsp; ✦</div>
  </div>
</div>
<script>
const W=()=>window.innerWidth,H=()=>window.innerHeight;
const delay=ms=>new Promise(r=>setTimeout(r,ms));
function ease(t){return t<0.5?2*t*t:1-(-2*t+2)**2/2;}
function lerp(a,b,t){return a+(b-a)*t;}
const flashEl=document.getElementById('flash');
function doFlash(dur=80,color='#fff'){
  flashEl.style.transition='opacity 0s';flashEl.style.background=color;flashEl.style.opacity='0.85';
  setTimeout(()=>{flashEl.style.transition='opacity 0.25s';flashEl.style.opacity='0';},dur);
}

let _ctx=null;
function aC(){if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();return _ctx;}
function mkNoise(c,dur){const b=c.createBuffer(1,Math.ceil(c.sampleRate*(dur+0.1)),c.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const s=c.createBufferSource();s.buffer=b;return s;}
function pt(freq,type,delay,dur,vol,dst){const c=aC(),now=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type=type||'sine';o.frequency.setValueAtTime(freq,now+delay);g.gain.setValueAtTime(0.001,now+delay);g.gain.linearRampToValueAtTime(vol||0.18,now+delay+0.018);g.gain.exponentialRampToValueAtTime(0.0001,now+delay+dur);o.connect(g);g.connect(dst||c.destination);o.start(now+delay);o.stop(now+delay+dur+0.1);}
function pn(delay,dur,vol,freq,q,dst){const c=aC(),now=c.currentTime,s=mkNoise(c,dur),f=c.createBiquadFilter(),g=c.createGain();f.type='bandpass';f.frequency.value=freq||800;f.Q.value=q||1;g.gain.setValueAtTime(0.001,now+delay);g.gain.linearRampToValueAtTime(vol||0.12,now+delay+0.03);g.gain.exponentialRampToValueAtTime(0.0001,now+delay+dur);s.connect(f);f.connect(g);g.connect(dst||c.destination);s.start(now+delay);}
function sw(f1,f2,type,delay,dur,vol,dst){const c=aC(),now=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type=type||'sine';o.frequency.setValueAtTime(f1,now+delay);o.frequency.exponentialRampToValueAtTime(f2,now+delay+dur);g.gain.setValueAtTime(vol||0.18,now+delay);g.gain.exponentialRampToValueAtTime(0.0001,now+delay+dur+0.05);o.connect(g);g.connect(dst||c.destination);o.start(now+delay);o.stop(now+delay+dur+0.1);}
function chord(freqs,type,delay,dur,vol){freqs.forEach((f,i)=>pt(f,type||'sine',delay+i*0.04,dur,vol||0.12));}
function impact(delay,lowVol,midVol){const c=aC(),now=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(80,now+delay);o.frequency.exponentialRampToValueAtTime(30,now+delay+0.15);g.gain.setValueAtTime(lowVol||0.3,now+delay);g.gain.exponentialRampToValueAtTime(0.001,now+delay+0.25);o.connect(g);g.connect(c.destination);o.start(now+delay);o.stop(now+delay+0.3);pn(delay,0.08,midVol||0.2,200,0.8);}


const snd={
  title:()=>{
    pn(0,0.05,0.28,2000,3);
    sw(200,580,'sawtooth',0.06,0.55,0.1);
    pt(440,'sawtooth',0.08,0.8,0.07);
  },
  crash:()=>{ impact(0,0.35,0.25); pn(0,0.3,0.2,380,0.4); sw(580,140,'sawtooth',0,0.28,0.14); },
  dots:()=>{ sw(380,1150,'sawtooth',0,0.38,0.1); pn(0,0.28,0.1,1400,2); },
  particle:()=>{
    // Spotlight sweep
    for(let i=0;i<3;i++) sw(280+i*40,560+i*40,'sine',i*0.65,0.55,0.1);
    pn(0,2.5,0.06,380,0.2);
    // Converge brass sting
    sw(180,750,'sawtooth',2.3,0.9,0.12);
    chord([330,415,523,659],'sawtooth',2.6,1.1,0.09);
    pt(880,'sine',3.7,0.28,0.18);
    pn(3.7,0.14,0.28,1150,2);
  },
  reveal:()=>{
    [261,330,392,523].forEach((f,i)=>pt(f,'sawtooth',i*0.05,2.0,0.1));
    sw(440,880,'sine',0.2,0.75,0.09);
    for(let i=0;i<4;i++) pt(980+i*120,'sine',0.22+i*0.08,0.9,0.07);
  }
};
const sc=document.getElementById('c-amb');const sx=sc.getContext('2d');
sc.width=W();sc.height=H();let starAlpha=0;

const sps=[{angle:-0.3,spd:0.003,a:0.05},{angle:0.1,spd:-0.004,a:0.07},{angle:0.5,spd:0.0035,a:0.06}];
function drawAmbient(){sx.clearRect(0,0,sc.width,sc.height);const CX=sc.width/2;sps.forEach(s=>{s.angle+=s.spd;const hw=Math.tan(0.1)*sc.height*2,g=sx.createLinearGradient(CX,0,CX,sc.height*2);g.addColorStop(0,`rgba(255,215,0,${s.a*starAlpha*2})`);g.addColorStop(1,'rgba(255,215,0,0)');sx.save();sx.beginPath();sx.moveTo(CX-3,0);sx.lineTo(CX+Math.sin(s.angle)*sc.height*2-hw,sc.height*2);sx.lineTo(CX+Math.sin(s.angle)*sc.height*2+hw,sc.height*2);sx.closePath();sx.fillStyle=g;sx.fill();sx.restore();});requestAnimationFrame(drawAmbient);}
drawAmbient();

const mc=document.getElementById('c-main');const mx=mc.getContext('2d');
const dc=document.getElementById('c-dots');const dx=dc.getContext('2d');
mc.width=W();mc.height=H();dc.width=W();dc.height=H();
function drawPhoto(ctx,alpha,offsetY=0){
  const cw=ctx.canvas.width,ch=ctx.canvas.height,iw=img.naturalWidth,ih=img.naturalHeight;
  const scale=Math.max(cw/iw,ch/ih)*0.9,dw=iw*scale,dh=ih*scale;
  ctx.save();ctx.globalAlpha=alpha;ctx.filter='saturate(0.55) brightness(0.58)';
  ctx.drawImage(img,(cw-dw)/2,(ch-dh)/2+offsetY,dw,dh);ctx.filter='none';
  const gr=ctx.createRadialGradient(cw/2,ch/2,ch*0.15,cw/2,ch/2,ch*0.85);
  gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,'rgba(0,0,0,0.9)');
  ctx.globalAlpha=1;ctx.fillStyle=gr;ctx.fillRect(0,0,cw,ch);ctx.restore();
}
async function run(){
  snd.title();
  const tb=document.getElementById('title-block');
  tb.style.opacity='1'; await delay(60);
  document.getElementById('title-name-inner').style.transform='translateY(0)';
  doFlash(60,'#ffd700'); await delay(350);
  document.getElementById('title-bar').style.width='140px';
  document.getElementById('title-from').style.opacity='1';
  await delay(1100);
  tb.style.transition='opacity 0.35s ease,transform 0.35s ease';
  tb.style.opacity='0';tb.style.transform='translateY(-28px)';
  await delay(350);tb.style.display='none';
  mc.width=W();mc.height=H();
  await new Promise(res=>{
    let t=0;function f(){t+=0.05;mx.clearRect(0,0,mc.width,mc.height);
      drawPhoto(mx,Math.min(t*2,1),(1-ease(Math.min(t,1)))*(-mc.height*0.35));
      if(t>=1){res();return;}requestAnimationFrame(f);}f();
  });
  snd.crash();doFlash(90);await delay(700);
  const cw=mc.width,ch=mc.height,CX=cw/2,CY=ch/2;
  const off=document.createElement('canvas');off.width=cw;off.height=ch;
  const ox2=off.getContext('2d');drawPhoto(ox2,1,0);
  const id=ox2.getImageData(0,0,cw,ch);
  const COLS=40,ROWS=Math.round(40*ch/cw);
  const dots=[];
  for(let row=0;row<ROWS;row++)for(let col=0;col<COLS;col++){
    const px=Math.round(col/COLS*cw),py=Math.round(row/ROWS*ch),i=(py*cw+px)*4;
    if(id.data[i+3]<20)continue;
    dots.push({x:px,y:py,ox:px,oy:py,r:1.8+Math.random()*1.5,cr:id.data[i],cg:id.data[i+1],cb:id.data[i+2],vx:0,vy:0,angle:0,dist:0});
  }
  snd.dots();
  await new Promise(res=>{
    let t=0;function f(){t+=0.04;
      mx.clearRect(0,0,cw,ch);drawPhoto(mx,1-ease(Math.min(t,1)),0);
      dx.clearRect(0,0,cw,ch);const show=ease(Math.min(t*1.3,1));
      dots.forEach(d=>{dx.globalAlpha=show;dx.beginPath();dx.arc(d.x,d.y,d.r,0,Math.PI*2);dx.fillStyle=`rgb(${d.cr},${d.cg},${d.cb})`;dx.fill();});
      if(t>=1){mx.clearRect(0,0,cw,ch);res();return;}requestAnimationFrame(f);}f();
  });
  await delay(300);
  
  // Pre-assign orbit params
  dots.forEach(d=>{
    d.angle=Math.atan2(d.oy-CY,d.ox-CX);
    d.orbitR=40+Math.random()*Math.min(cw,ch)*0.36;
    d.orbitSpd=0.025+Math.random()*0.02*(Math.random()<0.5?1:-1);
    // Set initial pos on orbit
    d.x=CX+Math.cos(d.angle)*d.orbitR;
    d.y=CY+Math.sin(d.angle)*d.orbitR*0.45;
  });
  snd.particle();
  await new Promise(res=>{
    let t=0;
    function f(){
      t+=0.018; dx.clearRect(0,0,cw,ch);
      const conv=t>2.2?Math.min((t-2.2)/1.4,1):0;
      dots.forEach(d=>{
        d.angle+=d.orbitSpd;
        const r=d.orbitR*(1-conv*0.96);
        d.x=CX+Math.cos(d.angle)*r;
        d.y=CY+Math.sin(d.angle)*r*0.45;
        // Simple flat dot - no per-dot gradient
        const spot=0.4+0.6*Math.abs(Math.sin(d.angle*1.5+t*1.8));
        const ff=conv>0.85?Math.max(0,1-(conv-0.85)/0.15):1;
        dx.globalAlpha=(0.55+spot*0.4)*ff;
        dx.fillStyle=spot>0.65?'#ffd700':`rgb(${d.cr},${d.cg},${d.cb})`;
        dx.beginPath(); dx.arc(d.x,d.y,d.r*(0.8+spot*0.5),0,Math.PI*2); dx.fill();
      });
      // Single center glow (one gradient, not per-dot)
      if(conv>0.4){
        const gl=dx.createRadialGradient(CX,CY,0,CX,CY,cw*0.28*(1-conv*0.4));
        gl.addColorStop(0,`rgba(255,215,0,${conv*0.35})`);
        gl.addColorStop(1,'transparent');
        dx.fillStyle=gl; dx.beginPath(); dx.arc(CX,CY,cw*0.28,0,Math.PI*2); dx.fill();
      }
      starAlpha=Math.min(t*0.6,1);
      if(conv>=1){ dx.clearRect(0,0,cw,ch); res(); return; }
      if(t>5){ dx.clearRect(0,0,cw,ch); res(); return; }
      requestAnimationFrame(f);
    } f();
  });
  doFlash(200,'#ffd700'); await delay(150);
  snd.reveal();
  const fb=document.getElementById('final-block');fb.style.opacity='1';await delay(80);
  document.getElementById('final-name').style.opacity='1';document.getElementById('final-name').style.transform='translateY(0)';
  await delay(340);
  document.getElementById('final-msg').style.opacity='1';document.getElementById('final-msg').style.transform='translateY(0)';
  await delay(500);
  document.getElementById('final-from').style.opacity='1';
  await delay(700);
  await new Promise(res=>{
    let t=0;function f(){t+=0.012;mx.clearRect(0,0,cw,ch);
      const iw=img.naturalWidth,ih=img.naturalHeight,scale=Math.max(cw/iw,ch/ih)*0.9,dw=iw*scale,dh=ih*scale;
      mx.save();mx.globalAlpha=ease(Math.min(t,1))*0.3;mx.filter='saturate(0.4) brightness(0.5)';
      mx.drawImage(img,(cw-dw)/2,(ch-dh)/2,dw,dh);mx.filter='none';
      const gr=mx.createRadialGradient(cw/2,ch/2,ch*0.1,cw/2,ch/2,ch*0.9);
      gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,'rgba(0,0,0,0.95)');
      mx.globalAlpha=1;mx.fillStyle=gr;mx.fillRect(0,0,cw,ch);mx.restore();
      if(t>=1){res();return;}requestAnimationFrame(f);}f();
  });
}
const tapOv=document.getElementById('tap-ov');
function startAll(){
  tapOv.style.opacity='0';
  setTimeout(()=>tapOv.style.display='none',600);
  img.complete?run():img.onload=run;
}
tapOv.addEventListener('click',startAll,{once:true});
tapOv.addEventListener('touchend',e=>{e.preventDefault();startAll();},{once:true,passive:false});
</script>
