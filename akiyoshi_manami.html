<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>秋吉愛美へ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100dvh;overflow:hidden;background:#0d0300;color:#fff;}
canvas{position:fixed;inset:0;pointer-events:none;}
#c-amb{z-index:1;}#c-main{z-index:2;}#c-dots{z-index:3;}
/* TAP OVERLAY */
#tap-ov{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.88);cursor:pointer;
  transition:opacity 0.6s ease;
}
#tap-inner{text-align:center;user-select:none;}
#tap-label{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.75rem,3.5vw,1.1rem);
  letter-spacing:0.45em;color:#ff5722;
  animation:tpulse 1.6s ease-in-out infinite;
}
#tap-name{
  font-family:'Shippori Mincho',serif;
  font-size:clamp(1.4rem,8vw,3rem);
  font-weight:800;letter-spacing:0.15em;
  color:rgba(255,255,255,0.2);margin-top:0.7rem;
}
@keyframes tpulse{0%,100%{opacity:0.4}50%{opacity:1}}
/* OVERLAY */
#overlay{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
#title-block{opacity:0;text-align:center;padding:0 1.5rem;}
#title-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(0.5rem,2vw,0.7rem);letter-spacing:0.5em;color:#ff5722;margin-bottom:1rem;}
#title-name{font-family:'Shippori Mincho',serif;font-size:clamp(2.8rem,16vw,6.5rem);font-weight:800;letter-spacing:0.1em;line-height:1;overflow:hidden;}
#title-name-inner{display:block;transform:translateY(110%);transition:transform 0.7s cubic-bezier(0.22,1,0.36,1);}
#title-bar{display:block;width:0;height:1px;background:linear-gradient(90deg,transparent,#ff5722,transparent);margin:0.8rem auto;max-width:180px;transition:width 0.6s ease 0.3s;}
#title-from{font-family:'Share Tech Mono',monospace;font-size:clamp(0.4rem,1.8vw,0.6rem);letter-spacing:0.45em;color:rgba(255,255,255,0.28);margin-top:0.3rem;opacity:0;transition:opacity 0.6s ease 0.6s;}
#final-block{opacity:0;display:flex;flex-direction:column;align-items:center;gap:1rem;transition:opacity 0.8s ease;text-align:center;padding:0 1.5rem;}
#final-name{font-family:'Shippori Mincho',serif;font-size:clamp(2.2rem,11vw,4.5rem);font-weight:800;letter-spacing:0.12em;color:#fff;text-shadow:0 0 40px #ff572288;opacity:0;transform:translateY(16px);transition:opacity 0.7s ease,transform 0.7s cubic-bezier(0.22,1,0.36,1);}
#final-msg{font-family:'Shippori Mincho',serif;font-size:clamp(0.9rem,4.5vw,1.4rem);font-weight:400;letter-spacing:0.15em;color:#ffccbc;text-shadow:0 0 20px #ffccbc88;opacity:0;transform:translateY(12px);transition:opacity 0.7s ease 0.25s,transform 0.7s ease 0.25s;}
#final-from{font-family:'Share Tech Mono',monospace;font-size:clamp(1.4rem,5.5vw,1.9rem);letter-spacing:0.35em;color:rgba(255,255,255,0.45);opacity:0;transition:opacity 0.7s ease 0.6s;}
#flash{position:fixed;inset:0;z-index:55;pointer-events:none;background:#fff;opacity:0;transition:opacity 0.25s;}
#scan{position:fixed;inset:0;z-index:15;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);}

#back-btn{
  display:inline-block;
  margin-top:2.2rem;
  padding:0.6em 2em;
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.9rem,3.5vw,1.1rem);
  letter-spacing:0.2em;
  color:rgba(255,255,255,0.7);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:999px;
  background:rgba(255,255,255,0.07);
  cursor:pointer;
  text-decoration:none;
  opacity:0;
  pointer-events:none;
  position:relative;
  z-index:60;
  transition:opacity 0.8s ease 1s, background 0.2s;
  -webkit-tap-highlight-color:transparent;
}
#back-btn:hover,#back-btn:active{background:rgba(255,255,255,0.18);}
</style>
</head>
<body>
<canvas id="c-amb"></canvas><canvas id="c-main"></canvas><canvas id="c-dots"></canvas>
<div id="scan"></div><div id="flash"></div>
<!-- TAP TO START -->
<div id="tap-ov">
  <div id="tap-inner">
    <div id="tap-label">▶ &nbsp; TAP TO PLAY &nbsp; ◀</div>
    <div id="tap-name">秋吉愛美 へ</div>
  </div>
</div>
<div id="overlay">
  <div id="title-block">
    <div id="title-sub">— MESSAGE —</div>
    <div id="title-name"><div id="title-name-inner">秋吉愛美</div></div>
    <span id="title-bar"></span>
    <div id="title-from">FROM &nbsp; YOSHY</div>
  </div>
  <div id="final-block">
    <div id="final-name">秋吉愛美</div>
    <div id="final-msg">100点のヤンチャさ</div>
    <div id="final-from">✦ &nbsp; Yoshy &nbsp; ✦</div>
    <a id="back-btn" href="index.html">← もどる</a>
  </div>
</div>
<canvas id="c-game" style="position:fixed;inset:0;z-index:40;pointer-events:auto;display:none;cursor:crosshair;"></canvas>
<div id="game-ui" style="position:fixed;inset:0;z-index:45;display:none;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:8vh;pointer-events:none;">
  <div style="font-family:'Share Tech Mono',monospace;font-size:clamp(0.55rem,2.5vw,0.82rem);letter-spacing:0.3em;color:#ff5722;margin-bottom:0.7rem;opacity:0.85;">🍂 落ち葉をひろえ！</div>
  <div style="display:flex;align-items:baseline;gap:0.25rem;">
    <span id="g-count" style="font-family:'Shippori Mincho',serif;font-size:clamp(2.2rem,11vw,3.5rem);font-weight:800;line-height:1;color:#fff;">12</span>
    <span style="font-family:'Shippori Mincho',serif;font-size:clamp(0.9rem,4vw,1.3rem);color:rgba(255,255,255,0.6);">残り</span>
  </div>
  <div style="width:min(220px,52vw);height:3px;background:rgba(255,255,255,0.15);border-radius:2px;margin-top:0.9rem;overflow:hidden;">
    <div id="g-fill" style="height:100%;width:0%;background:#ff5722;border-radius:2px;transition:width 0.18s ease;"></div>
  </div>
</div>
<div id="game-clear" style="position:fixed;inset:0;z-index:46;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:clamp(1.8rem,9vw,3.2rem);letter-spacing:0.5em;color:#fff;opacity:0;pointer-events:none;transition:opacity 0.3s;text-shadow:0 0 35px #ff5722;">✦ CLEAR! ✦</div>
<script>

const gcEl=document.getElementById('c-game');const gc=gcEl.getContext('2d');
gcEl.width=window.innerWidth;gcEl.height=window.innerHeight;
const gcW=gcEl.width,gcH=gcEl.height;

const BIN_X=gcW/2,BIN_Y=gcH*0.62;
const BIN_W=gcW*0.22,BIN_H=gcH*0.14;

let gRunning=false,gLeaves=[],gScore=0,gRafId=0,gSpawnT=0,gLastTs=0;
let gDrag=null; // currently dragged leaf

const COLORS=['#ff5722','#ff8f00','#e65100','#bf360c','#d84315'];

function gSpawnLeaf(){
  // Spawn on edges, avoiding bin center
  let x,y;
  const side=Math.floor(Math.random()*4);
  if(side===0){x=gcW*0.08+Math.random()*gcW*0.84;y=gcH*0.06+Math.random()*gcH*0.18;}
  else if(side===1){x=gcW*0.06+Math.random()*gcW*0.35;y=gcH*0.28+Math.random()*gcH*0.35;}
  else if(side===2){x=gcW*0.59+Math.random()*gcW*0.35;y=gcH*0.28+Math.random()*gcH*0.35;}
  else{x=gcW*0.08+Math.random()*gcW*0.84;y=gcH*0.78+Math.random()*gcH*0.16;}
  gLeaves.push({
    x,y,rot:Math.random()*Math.PI*2,
    r:16+Math.random()*10,
    col:COLORS[Math.floor(Math.random()*COLORS.length)],
    dragging:false,offX:0,offY:0,
    scored:false,scoreAnim:0,wobble:Math.random()*Math.PI*2
  });
}

function gDrawBin(shake){
  gc.save();
  gc.translate(BIN_X,BIN_Y+(shake?Math.sin(Date.now()*0.05)*3:0));
  // Lid
  gc.globalAlpha=0.88;
  gc.fillStyle='#546e7a';
  gc.beginPath();
  gc.roundRect(-BIN_W/2-5,-BIN_H*0.12,BIN_W+10,BIN_H*0.2,4);
  gc.fill();
  // Handle on lid
  gc.fillStyle='#37474f';
  gc.beginPath();
  gc.roundRect(-BIN_W*0.15,-BIN_H*0.22,BIN_W*0.3,BIN_H*0.14,4);
  gc.fill();
  // Body (solid trapezoid, no stripes)
  gc.fillStyle='#607d8b';
  gc.beginPath();
  gc.moveTo(-BIN_W/2+BIN_W*0.06,0);
  gc.lineTo(-BIN_W/2,BIN_H*0.88);
  gc.lineTo(BIN_W/2,BIN_H*0.88);
  gc.lineTo(BIN_W/2-BIN_W*0.06,0);
  gc.closePath();
  gc.fill();
  // Highlight strip
  gc.globalAlpha=0.18;
  gc.fillStyle='#fff';
  gc.beginPath();
  gc.moveTo(-BIN_W*0.28,BIN_H*0.06);
  gc.lineTo(-BIN_W*0.22,BIN_H*0.82);
  gc.lineTo(-BIN_W*0.1,BIN_H*0.82);
  gc.lineTo(-BIN_W*0.16,BIN_H*0.06);
  gc.closePath();
  gc.fill();
  gc.restore();
}
function gInBin(x,y){
  return Math.abs(x-BIN_X)<BIN_W*0.6 && y>BIN_Y-BIN_H*0.1 && y<BIN_Y+BIN_H;
}

function gDraw(){
  if(!gRunning)return;
  const ts=Date.now();
  gSpawnT++;
  if(gSpawnT>90&&gLeaves.filter(l=>!l.scored).length<5){gSpawnT=0;gSpawnLeaf();}

  gc.clearRect(0,0,gcW,gcH);

  // Bin glow when drag nearby
  const nearBin=gDrag&&Math.hypot(gDrag.x-BIN_X,gDrag.y-BIN_Y)<gcW*0.28;
  if(nearBin){
    gc.globalAlpha=0.2;
    const bg=gc.createRadialGradient(BIN_X,BIN_Y,0,BIN_X,BIN_Y,BIN_W);
    bg.addColorStop(0,'#ff5722');bg.addColorStop(1,'transparent');
    gc.fillStyle=bg;gc.beginPath();gc.arc(BIN_X,BIN_Y,BIN_W,0,Math.PI*2);gc.fill();
  }

  // Leaves
  gLeaves.forEach(l=>{
    if(l.scored){
      l.scoreAnim+=0.07;
      gc.save();gc.translate(l.x,l.y);gc.scale(1-l.scoreAnim,1-l.scoreAnim);
      gc.globalAlpha=Math.max(0,1-l.scoreAnim);
      gc.fillStyle=l.col;
      gc.beginPath();gc.moveTo(0,-l.r*1.4);gc.quadraticCurveTo(l.r*1.1,-l.r*0.3,0,l.r*0.9);gc.quadraticCurveTo(-l.r*1.1,-l.r*0.3,0,-l.r*1.4);gc.fill();
      gc.restore();return;
    }
    if(!l.dragging) l.wobble+=0.015;
    gc.save();gc.translate(l.x,l.y);
    gc.rotate(l.rot+(l.dragging?0:Math.sin(l.wobble)*0.08));
    gc.globalAlpha=l.dragging?0.92:0.85;
    gc.fillStyle=l.col;
    // Leaf shape
    gc.beginPath();gc.moveTo(0,-l.r*1.5);gc.quadraticCurveTo(l.r*1.2,-l.r*0.3,0,l.r);gc.quadraticCurveTo(-l.r*1.2,-l.r*0.3,0,-l.r*1.5);gc.fill();
    // Vein
    gc.globalAlpha*=0.3;gc.strokeStyle='rgba(255,255,255,0.8)';gc.lineWidth=1;
    gc.beginPath();gc.moveTo(0,-l.r*1.3);gc.lineTo(0,l.r*0.8);gc.stroke();
    if(l.dragging){
      gc.globalAlpha=0.4;gc.strokeStyle='#ffdd00';gc.lineWidth=2;
      gc.beginPath();gc.arc(0,0,l.r*1.6,0,Math.PI*2);gc.stroke();
    }
    gc.restore();
  });
  gLeaves=gLeaves.filter(l=>!l.scored||l.scoreAnim<1);

  // Bin drawn on top of leaves
  gDrawBin(nearBin);

  gc.globalAlpha=1;
  gRafId=requestAnimationFrame(gDraw);
}

function gFindLeaf(px,py){
  for(let i=gLeaves.length-1;i>=0;i--){
    const l=gLeaves[i];
    if(!l.scored&&Math.hypot(px-l.x,py-l.y)<l.r*2.0) return l;
  }
  return null;
}
function gPointerDown(px,py){
  if(!gRunning)return;
  const l=gFindLeaf(px,py);
  if(l){l.dragging=true;l.offX=l.x-px;l.offY=l.y-py;gDrag=l;sw(300,500,'sine',0,0.1,0.1);}
}
function gPointerMove(px,py){
  if(gDrag){gDrag.x=px+gDrag.offX;gDrag.y=py+gDrag.offY;}
}
function gPointerUp(px,py){
  if(gDrag){
    if(gInBin(gDrag.x,gDrag.y)){
      gDrag.scored=true;gDrag.scoreAnim=0;gScore++;
      chord([440,554,659],'sine',0,0.5,0.12);
      pt(880,'sine',0.05,0.3,0.1);
      document.getElementById('g-count').textContent=Math.max(0,12-gScore);
      document.getElementById('g-fill').style.width=(gScore/12*100)+'%';
      if(gScore>=12){gRunning=false;chord([523,659,784,1047],'sine',0,1.2,0.12);for(let i=0;i<5;i++)pt(1047+i*130,'sine',i*0.07,0.8,0.07);doFlash(140,'#ff5722');document.getElementById('game-clear').style.opacity='1';setTimeout(()=>{['game-ui','c-game','game-clear'].forEach(id=>{const el=document.getElementById(id);el.style.transition='opacity 0.6s';el.style.opacity='0';});setTimeout(()=>{['game-ui','c-game','game-clear'].forEach(id=>document.getElementById(id).style.display='none');run();},680);},950);}
    }else{
      pn(0,0.1,0.12,200,0.5);
    }
    gDrag.dragging=false;gDrag=null;
  }
}

gcEl.addEventListener('mousedown',e=>{const r=gcEl.getBoundingClientRect();gPointerDown(e.clientX-r.left,e.clientY-r.top);});
gcEl.addEventListener('mousemove',e=>{const r=gcEl.getBoundingClientRect();gPointerMove(e.clientX-r.left,e.clientY-r.top);});
gcEl.addEventListener('mouseup',e=>{const r=gcEl.getBoundingClientRect();gPointerUp(e.clientX-r.left,e.clientY-r.top);});
gcEl.addEventListener('touchstart',e=>{e.preventDefault();const r=gcEl.getBoundingClientRect(),t=e.changedTouches[0];gPointerDown(t.clientX-r.left,t.clientY-r.top);},{passive:false});
gcEl.addEventListener('touchmove',e=>{e.preventDefault();const r=gcEl.getBoundingClientRect(),t=e.touches[0];gPointerMove(t.clientX-r.left,t.clientY-r.top);},{passive:false});
gcEl.addEventListener('touchend',e=>{e.preventDefault();const r=gcEl.getBoundingClientRect(),t=e.changedTouches[0];gPointerUp(t.clientX-r.left,t.clientY-r.top);},{passive:false});

function startGame(){
  gRunning=true;
  for(let i=0;i<4;i++) gSpawnLeaf();
  document.getElementById('game-ui').style.display='flex';
  gcEl.style.display='block';
  requestAnimationFrame(ts=>{gLastTs=ts;gDraw();});
}

const W=()=>window.innerWidth,H=()=>window.innerHeight;
const delay=ms=>new Promise(r=>setTimeout(r,ms));
function ease(t){return t<0.5?2*t*t:1-(-2*t+2)**2/2;}
function lerp(a,b,t){return a+(b-a)*t;}
const flashEl=document.getElementById('flash');
function doFlash(dur=80,color='#fff'){
  flashEl.style.transition='opacity 0s';flashEl.style.background=color;flashEl.style.opacity='0.85';
  setTimeout(()=>{flashEl.style.transition='opacity 0.25s';flashEl.style.opacity='0';},dur);
}
// ── Audio ──

// ── Audio Utilities ──
let _ctx=null;
function aC(){if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();return _ctx;}
function mkNoise(c,dur){
  const b=c.createBuffer(1,Math.ceil(c.sampleRate*(dur+0.1)),c.sampleRate);
  const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const s=c.createBufferSource();s.buffer=b;return s;
}
function pt(freq,type,delay,dur,vol,dst){ // play tone
  const c=aC(),now=c.currentTime,o=c.createOscillator(),g=c.createGain();
  o.type=type||'sine';o.frequency.setValueAtTime(freq,now+delay);
  g.gain.setValueAtTime(0.001,now+delay);
  g.gain.linearRampToValueAtTime(vol||0.18,now+delay+0.018);
  g.gain.exponentialRampToValueAtTime(0.0001,now+delay+dur);
  o.connect(g);g.connect(dst||c.destination);o.start(now+delay);o.stop(now+delay+dur+0.1);
}
function pn(delay,dur,vol,freq,q,dst){ // play filtered noise
  const c=aC(),now=c.currentTime,s=mkNoise(c,dur),f=c.createBiquadFilter(),g=c.createGain();
  f.type='bandpass';f.frequency.value=freq||800;f.Q.value=q||1;
  g.gain.setValueAtTime(0.001,now+delay);
  g.gain.linearRampToValueAtTime(vol||0.12,now+delay+0.03);
  g.gain.exponentialRampToValueAtTime(0.0001,now+delay+dur);
  s.connect(f);f.connect(g);g.connect(dst||c.destination);s.start(now+delay);
}
function sw(f1,f2,type,delay,dur,vol,dst){ // sweep
  const c=aC(),now=c.currentTime,o=c.createOscillator(),g=c.createGain();
  o.type=type||'sine';o.frequency.setValueAtTime(f1,now+delay);
  o.frequency.exponentialRampToValueAtTime(f2,now+delay+dur);
  g.gain.setValueAtTime(vol||0.18,now+delay);
  g.gain.exponentialRampToValueAtTime(0.0001,now+delay+dur+0.05);
  o.connect(g);g.connect(dst||c.destination);o.start(now+delay);o.stop(now+delay+dur+0.1);
}
function chord(freqs,type,delay,dur,vol){ // chord
  freqs.forEach((f,i)=>pt(f,type||'sine',delay+i*0.04,dur,vol||0.12));
}
function impact(delay,lowVol,midVol){ // physical impact
  const c=aC(),now=c.currentTime;
  // low thud
  const o=c.createOscillator(),g=c.createGain();
  o.type='sine';o.frequency.setValueAtTime(80,now+delay);
  o.frequency.exponentialRampToValueAtTime(30,now+delay+0.15);
  g.gain.setValueAtTime(lowVol||0.3,now+delay);
  g.gain.exponentialRampToValueAtTime(0.001,now+delay+0.25);
  o.connect(g);g.connect(c.destination);o.start(now+delay);o.stop(now+delay+0.3);
  // noise transient
  pn(delay,0.08,midVol||0.2,200,0.8);
}


const snd={
  title:()=>{
    pn(0,0.8,0.12,600,0.4); // rustle
    pt(440,'sine',0.1,1.0,0.08);
  },
  crash:()=>{ impact(0,0.28,0.18); pn(0,0.4,0.15,500,0.5); },
  dots:()=>{ pn(0,0.5,0.1,800,1); sw(300,700,'sine',0,0.4,0.07); },
  particle:()=>{
    // Leaves falling - continuous rustle, individual crinkles
    pn(0,6,0.1,700,0.3); // sustained rustle
    // Individual leaf sounds during fall
    for(let i=0;i<8;i++){
      const d=i*0.5+Math.random()*0.3;
      pn(d,0.2,0.08,400+Math.random()*400,1.2);
    }
    // Settling - rustle quiets
    pn(2.5,2,0.06,400,0.5);
    // Fade-out silence
  },
  reveal:()=>{
    // Warm autumn chord - A minor
    chord([220,262,330,440],'sine',0,2.5,0.1);
    pn(0,0.5,0.06,600,0.4);
  }
};
// ── Ambient Canvas ──
const sc=document.getElementById('c-amb');const sx=sc.getContext('2d');
sc.width=W();sc.height=H();let starAlpha=0;
const lv=Array.from({length:35},()=>{return{x:Math.random()*sc.width,y:Math.random()*sc.height-sc.height,sz:5+Math.random()*8,rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.05,vx:(Math.random()-0.5)*1.2,vy:1+Math.random()*1.5,c:['#ff5722','#ffab40','#ff7043','#ffa726'][Math.floor(Math.random()*4)]}});function drawAmbient(){sx.clearRect(0,0,sc.width,sc.height);lv.forEach(l=>{l.x+=l.vx+Math.sin(l.y*0.015)*0.5;l.y+=l.vy;l.rot+=l.rotV;if(l.y>sc.height+20){l.y=-20;l.x=Math.random()*sc.width;};sx.save();sx.translate(l.x,l.y);sx.rotate(l.rot);sx.globalAlpha=0.6*starAlpha;sx.fillStyle=l.c;sx.beginPath();sx.moveTo(0,-l.sz);sx.quadraticCurveTo(l.sz*0.8,-l.sz*0.2,0,l.sz*0.4);sx.quadraticCurveTo(-l.sz*0.8,-l.sz*0.2,0,-l.sz);sx.fill();sx.restore();});requestAnimationFrame(drawAmbient);}drawAmbient();

const mc=document.getElementById('c-main');const mx=mc.getContext('2d');
const dc=document.getElementById('c-dots');const dx=dc.getContext('2d');
mc.width=W();mc.height=H();dc.width=W();dc.height=H();
function drawPhoto(ctx,alpha,offsetY=0){
  const cw=ctx.canvas.width,ch=ctx.canvas.height;
  const iw=img.naturalWidth,ih=img.naturalHeight;
  const scale=Math.max(cw/iw,ch/ih)*0.9;
  const dw=iw*scale,dh=ih*scale;
  ctx.save();ctx.globalAlpha=alpha;ctx.filter='saturate(0.55) brightness(0.58)';
  ctx.drawImage(img,(cw-dw)/2,(ch-dh)/2+offsetY,dw,dh);ctx.filter='none';
  const gr=ctx.createRadialGradient(cw/2,ch/2,ch*0.15,cw/2,ch/2,ch*0.85);
  gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,'rgba(0,0,0,0.9)');
  ctx.globalAlpha=1;ctx.fillStyle=gr;ctx.fillRect(0,0,cw,ch);ctx.restore();
}
async function run(){
  // ── TITLE ──
  snd.title();
  const tb=document.getElementById('title-block');
  tb.style.opacity='1'; await delay(60);
  document.getElementById('title-name-inner').style.transform='translateY(0)';
  doFlash(60,'#ff5722'); await delay(350);
  document.getElementById('title-bar').style.width='140px';
  document.getElementById('title-from').style.opacity='1';
  await delay(1100);
  tb.style.transition='opacity 0.35s ease,transform 0.35s ease';
  tb.style.opacity='0';tb.style.transform='translateY(-28px)';
  await delay(350);tb.style.display='none';
  // ── PHOTO CRASH ──
  mc.width=W();mc.height=H();
  await new Promise(res=>{
    let t=0;function f(){t+=0.05;mx.clearRect(0,0,mc.width,mc.height);
      drawPhoto(mx,Math.min(t*2,1),(1-ease(Math.min(t,1)))*(-mc.height*0.35));
      if(t>=1){res();return;}requestAnimationFrame(f);}f();
  });
  snd.crash(); doFlash(90); await delay(700);
  // ── PHOTO → DOTS ──
  const cw=mc.width,ch=mc.height;
  const CX=cw/2,CY=ch/2;
  const off=document.createElement('canvas');off.width=cw;off.height=ch;
  const ox2=off.getContext('2d');drawPhoto(ox2,1,0);
  const id=ox2.getImageData(0,0,cw,ch);
  const COLS=40,ROWS=Math.round(40*ch/cw);
  const dots=[];
  for(let row=0;row<ROWS;row++)for(let col=0;col<COLS;col++){
    const px=Math.round(col/COLS*cw),py=Math.round(row/ROWS*ch);
    const i=(py*cw+px)*4;if(id.data[i+3]<20)continue;
    dots.push({x:px,y:py,ox:px,oy:py,r:1.8+Math.random()*1.5,cr:id.data[i],cg:id.data[i+1],cb:id.data[i+2],vx:0,vy:0,angle:0,dist:0});
  }
  snd.dots();
  await new Promise(res=>{
    let t=0;function f(){t+=0.04;
      mx.clearRect(0,0,cw,ch);drawPhoto(mx,1-ease(Math.min(t,1)),0);
      dx.clearRect(0,0,cw,ch);const show=ease(Math.min(t*1.3,1));
      dots.forEach(d=>{dx.globalAlpha=show;dx.beginPath();dx.arc(d.x,d.y,d.r,0,Math.PI*2);dx.fillStyle=`rgb(${d.cr},${d.cg},${d.cb})`;dx.fill();});
      if(t>=1){mx.clearRect(0,0,cw,ch);res();return;}requestAnimationFrame(f);}f();
  });
  await delay(300);
  // ── THEME PARTICLE SEQUENCE ──
  
  snd.particle();
  dots.forEach(d=>{ d.vx=(Math.random()-0.5)*2.5; d.vy=1+Math.random()*2.5; d.wobble=Math.random()*Math.PI*2; d.wSpd=0.03+Math.random()*0.04; d.rot=Math.random()*Math.PI*2; d.rotV=(Math.random()-0.5)*0.08; d.settled=false; d.settleY=ch*0.65+Math.random()*ch*0.35; });
  await new Promise(res=>{
    let t=0,settleT=-1;function f(){
      t+=0.016; dx.clearRect(0,0,cw,ch); let allS=true;
      dots.forEach(d=>{
        d.wobble+=d.wSpd; d.rot+=d.rotV;
        if(!d.settled){ d.x+=d.vx+Math.sin(d.wobble)*1.8; d.y+=d.vy; if(d.y>=d.settleY){d.settled=true;d.y=d.settleY;d.rotV*=0.3;}else allS=false; }
        else{ d.x+=Math.sin(d.wobble)*0.15; d.rot+=d.rotV*0.95; d.rotV*=0.92; }
        const ff=settleT>0?Math.max(0,1-(t-settleT)/1.5):1;
        dx.save(); dx.translate(d.x,d.y); dx.rotate(d.rot); dx.globalAlpha=0.85*ff;
        dx.fillStyle=`rgb(${d.cr},${d.cg},${d.cb})`;
        dx.beginPath(); dx.moveTo(0,-d.r*2); dx.quadraticCurveTo(d.r*1.4,-d.r*0.5,0,d.r*1.5); dx.quadraticCurveTo(-d.r*1.4,-d.r*0.5,0,-d.r*2); dx.fill(); dx.restore();
      });
      starAlpha=Math.min(t*0.7,1);
      if(allS&&settleT<0)settleT=t;
      if(settleT>0&&t-settleT>1.8){dx.clearRect(0,0,cw,ch);res();return;}
      if(t>6){dx.clearRect(0,0,cw,ch);res();return;}
      requestAnimationFrame(f);
    } f();
  });
  await delay(100);
  // ── FINAL TEXT ──
  snd.reveal();
  const fb=document.getElementById('final-block');fb.style.opacity='1'; await delay(80);
  document.getElementById('final-name').style.opacity='1';document.getElementById('final-name').style.transform='translateY(0)';
  await delay(340);
  document.getElementById('final-msg').style.opacity='1';document.getElementById('final-msg').style.transform='translateY(0)';
  await delay(500);
  document.getElementById('final-from').style.opacity='1';
  setTimeout(()=>{const b=document.getElementById('back-btn');if(b){b.style.opacity='1';b.style.pointerEvents='auto';}},1400);
  // ── GHOST PHOTO ──
  await delay(700);
  await new Promise(res=>{
    let t=0;function f(){t+=0.012;mx.clearRect(0,0,cw,ch);
      const iw=img.naturalWidth,ih=img.naturalHeight,scale=Math.max(cw/iw,ch/ih)*0.9,dw=iw*scale,dh=ih*scale;
      mx.save();mx.globalAlpha=ease(Math.min(t,1))*0.3;mx.filter='saturate(0.4) brightness(0.5)';
      mx.drawImage(img,(cw-dw)/2,(ch-dh)/2,dw,dh);mx.filter='none';
      const gr=mx.createRadialGradient(cw/2,ch/2,ch*0.1,cw/2,ch/2,ch*0.9);
      gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,'rgba(0,0,0,0.95)');
      mx.globalAlpha=1;mx.fillStyle=gr;mx.fillRect(0,0,cw,ch);mx.restore();
      if(t>=1){res();return;}requestAnimationFrame(f);}f();
  });
}
// ── TAP TO START ──
const tapOv=document.getElementById('tap-ov');
function startAll(){
  tapOv.style.opacity='0';
  setTimeout(()=>tapOv.style.display='none',600);
  startGame();
}
tapOv.addEventListener('click',startAll,{once:true});
tapOv.addEventListener('touchend',e=>{e.preventDefault();startAll();},{once:true,passive:false});
</script>
