<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>山本航暉へ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100dvh;overflow:hidden;background:#00020d;color:#fff;}
canvas{position:fixed;inset:0;pointer-events:none;}
#c-amb{z-index:1;}#c-main{z-index:2;}#c-dots{z-index:3;}
/* TAP OVERLAY */
#tap-ov{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.88);cursor:pointer;
  transition:opacity 0.6s ease;
}
#tap-inner{text-align:center;user-select:none;}
#tap-label{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.75rem,3.5vw,1.1rem);
  letter-spacing:0.45em;color:#4fc3f7;
  animation:tpulse 1.6s ease-in-out infinite;
}
#tap-name{
  font-family:'Shippori Mincho',serif;
  font-size:clamp(1.4rem,8vw,3rem);
  font-weight:800;letter-spacing:0.15em;
  color:rgba(255,255,255,0.2);margin-top:0.7rem;
}
@keyframes tpulse{0%,100%{opacity:0.4}50%{opacity:1}}
/* OVERLAY */
#overlay{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
#title-block{opacity:0;text-align:center;padding:0 1.5rem;}
#title-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(0.5rem,2vw,0.7rem);letter-spacing:0.5em;color:#4fc3f7;margin-bottom:1rem;}
#title-name{font-family:'Shippori Mincho',serif;font-size:clamp(2.8rem,16vw,6.5rem);font-weight:800;letter-spacing:0.1em;line-height:1;overflow:hidden;}
#title-name-inner{display:block;transform:translateY(110%);transition:transform 0.7s cubic-bezier(0.22,1,0.36,1);}
#title-bar{display:block;width:0;height:1px;background:linear-gradient(90deg,transparent,#4fc3f7,transparent);margin:0.8rem auto;max-width:180px;transition:width 0.6s ease 0.3s;}
#title-from{font-family:'Share Tech Mono',monospace;font-size:clamp(0.4rem,1.8vw,0.6rem);letter-spacing:0.45em;color:rgba(255,255,255,0.28);margin-top:0.3rem;opacity:0;transition:opacity 0.6s ease 0.6s;}
#final-block{opacity:0;display:flex;flex-direction:column;align-items:center;gap:1rem;transition:opacity 0.8s ease;text-align:center;padding:0 1.5rem;}
#final-name{font-family:'Shippori Mincho',serif;font-size:clamp(2.2rem,11vw,4.5rem);font-weight:800;letter-spacing:0.12em;color:#fff;text-shadow:0 0 40px #4fc3f788;opacity:0;transform:translateY(16px);transition:opacity 0.7s ease,transform 0.7s cubic-bezier(0.22,1,0.36,1);}
#final-msg{font-family:'Shippori Mincho',serif;font-size:clamp(0.9rem,4.5vw,1.4rem);font-weight:400;letter-spacing:0.15em;color:#ffd54f;text-shadow:0 0 20px #ffd54f88;opacity:0;transform:translateY(12px);transition:opacity 0.7s ease 0.25s,transform 0.7s ease 0.25s;}
#final-from{font-family:'Share Tech Mono',monospace;font-size:clamp(1.4rem,5.5vw,1.9rem);letter-spacing:0.35em;color:rgba(255,255,255,0.45);opacity:0;transition:opacity 0.7s ease 0.6s;}
#flash{position:fixed;inset:0;z-index:55;pointer-events:none;background:#fff;opacity:0;transition:opacity 0.25s;}
#scan{position:fixed;inset:0;z-index:15;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);}

#back-btn{
  display:inline-block;
  margin-top:2.2rem;
  padding:0.6em 2em;
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.9rem,3.5vw,1.1rem);
  letter-spacing:0.2em;
  color:rgba(255,255,255,0.7);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:999px;
  background:rgba(255,255,255,0.07);
  cursor:pointer;
  text-decoration:none;
  opacity:0;
  pointer-events:none;
  position:relative;
  z-index:60;
  transition:opacity 0.8s ease 1s, background 0.2s;
  -webkit-tap-highlight-color:transparent;
}
#back-btn:hover,#back-btn:active{background:rgba(255,255,255,0.18);}
</style>
</head>
<body>
<canvas id="c-amb"></canvas><canvas id="c-main"></canvas><canvas id="c-dots"></canvas>
<div id="scan"></div><div id="flash"></div>
<!-- TAP TO START -->
<div id="tap-ov">
  <div id="tap-inner">
    <div id="tap-label">▶ &nbsp; TAP TO PLAY &nbsp; ◀</div>
    <div id="tap-name">山本航暉 へ</div>
  </div>
</div>
<div id="overlay">
  <div id="title-block">
    <div id="title-sub">— MESSAGE —</div>
    <div id="title-name"><div id="title-name-inner">山本航暉</div></div>
    <span id="title-bar"></span>
    <div id="title-from">FROM &nbsp; YOSHY</div>
  </div>
  <div id="final-block">
    <div id="final-name">山本航暉</div>
    <div id="final-msg">足と手さらに伸ばそう</div>
    <div id="final-from">✦ &nbsp; Yoshy &nbsp; ✦</div>
    <a id="back-btn" href="index.html">← もどる</a>
  </div>
</div>
<canvas id="c-game" style="position:fixed;inset:0;z-index:40;pointer-events:auto;display:none;cursor:crosshair;"></canvas>
<div id="game-ui" style="position:fixed;inset:0;z-index:45;display:none;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:8vh;pointer-events:none;">
  <div style="font-family:'Share Tech Mono',monospace;font-size:clamp(0.55rem,2.5vw,0.82rem);letter-spacing:0.3em;color:#4fc3f7;margin-bottom:0.7rem;opacity:0.85;">☄️ 隕石を撃ち落とせ！</div>
  <div style="display:flex;align-items:baseline;gap:0.25rem;">
    <span id="g-count" style="font-family:'Shippori Mincho',serif;font-size:clamp(2.2rem,11vw,3.5rem);font-weight:800;line-height:1;color:#fff;">12</span>
    <span style="font-family:'Shippori Mincho',serif;font-size:clamp(0.9rem,4vw,1.3rem);color:rgba(255,255,255,0.6);">残り</span>
  </div>
  <div style="width:min(220px,52vw);height:3px;background:rgba(255,255,255,0.15);border-radius:2px;margin-top:0.9rem;overflow:hidden;">
    <div id="g-fill" style="height:100%;width:0%;background:#4fc3f7;border-radius:2px;transition:width 0.18s ease;"></div>
  </div>
</div>
<div id="game-clear" style="position:fixed;inset:0;z-index:46;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:clamp(1.8rem,9vw,3.2rem);letter-spacing:0.5em;color:#fff;opacity:0;pointer-events:none;transition:opacity 0.3s;text-shadow:0 0 35px #4fc3f7;">✦ CLEAR! ✦</div>
<script>

const gcEl=document.getElementById('c-game');const gc=gcEl.getContext('2d');
gcEl.width=window.innerWidth;gcEl.height=window.innerHeight;
const gcW=gcEl.width,gcH=gcEl.height;
let gRunning=false,gAsts=[],gBullets=[],gScore=0,gLastTs=0,gRafId=0,gSpawnT=0;
const CANNON={x:gcW*0.5,y:gcH*0.92,angle:-Math.PI/2};
function gSpawn(){gAsts.push({x:gcW*0.05+Math.random()*gcW*0.9,y:-30,vy:1.5+Math.random()*2,vx:(Math.random()-0.5)*1.2,r:14+Math.random()*10,rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.04});}
function gShoot(px,py){
  if(!gRunning)return;
  const dx=px-CANNON.x,dy=py-CANNON.y,len=Math.sqrt(dx*dx+dy*dy)||1;
  const spd=18;
  gBullets.push({x:CANNON.x,y:CANNON.y,vx:dx/len*spd,vy:dy/len*spd,life:1});
  sw(400,1200,'sawtooth',0,0.12,0.12);pn(0,0.06,0.18,300,0.6);
  CANNON.angle=Math.atan2(dy,dx);
}
function gLoop(ts){
  if(!gRunning)return;
  const dt=Math.min((ts-gLastTs)/16,2.5);gLastTs=ts;gSpawnT+=dt;
  if(gSpawnT>80&&gAsts.length<6){gSpawnT=0;gSpawn();}
  // move
  gBullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=0.015*dt;});
  gBullets=gBullets.filter(b=>b.life>0&&b.y>-20&&b.x>-20&&b.x<gcW+20);
  gAsts.forEach(a=>{a.x+=a.vx*dt;a.y+=a.vy*dt;a.rot+=a.rotV*dt;});
  gAsts=gAsts.filter(a=>a.y<gcH+60);
  // collision
  for(let bi=gBullets.length-1;bi>=0;bi--){
    const b=gBullets[bi];
    for(let ai=gAsts.length-1;ai>=0;ai--){
      const a=gAsts[ai];
      if(Math.hypot(b.x-a.x,b.y-a.y)<a.r+8){
        gBullets.splice(bi,1);gAsts.splice(ai,1);gScore++;
        pn(0,0.12,0.25,300,0.5);sw(600,80,'sine',0,0.2,0.15);
        document.getElementById('g-count').textContent=Math.max(0,12-gScore);
        document.getElementById('g-fill').style.width=(gScore/12*100)+'%';
        for(let i=0;i<6;i++)gBullets.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:0.4,debris:true});
        if(gScore>=12){gRunning=false;chord([523,659,784,1047],'sine',0,1.2,0.12);for(let i=0;i<5;i++)pt(1047+i*130,'sine',i*0.07,0.8,0.07);doFlash(140,'#4fc3f7');document.getElementById('game-clear').style.opacity='1';setTimeout(()=>{['game-ui','c-game','game-clear'].forEach(id=>{const el=document.getElementById(id);el.style.transition='opacity 0.6s';el.style.opacity='0';});setTimeout(()=>{['game-ui','c-game','game-clear'].forEach(id=>document.getElementById(id).style.display='none');run();},680);},950);}
        break;
      }
    }
  }
  // draw
  gc.clearRect(0,0,gcW,gcH);
  // cannon
  gc.save();gc.translate(CANNON.x,CANNON.y);gc.rotate(CANNON.angle+Math.PI/2);
  gc.fillStyle='#4fc3f7';gc.globalAlpha=0.9;gc.beginPath();gc.moveTo(0,-28);gc.lineTo(10,10);gc.lineTo(-10,10);gc.closePath();gc.fill();
  gc.restore();
  // asteroids
  gAsts.forEach(a=>{
    gc.save();gc.translate(a.x,a.y);gc.rotate(a.rot);gc.globalAlpha=0.88;
    gc.fillStyle='#b0bec5';gc.beginPath();
    const pts2=[[0,-a.r],[a.r*0.65,-a.r*0.4],[a.r*0.85,a.r*0.3],[a.r*0.2,a.r*0.8],[-a.r*0.5,a.r*0.65],[-a.r*0.85,-a.r*0.15],[-a.r*0.3,-a.r*0.7]];
    pts2.forEach((p,i)=>i===0?gc.moveTo(p[0],p[1]):gc.lineTo(p[0],p[1]));
    gc.closePath();gc.fill();gc.restore();
  });
  // bullets
  gBullets.forEach(b=>{
    gc.globalAlpha=b.life;gc.fillStyle=b.debris?'#ff6d00':'#4fc3f7';
    gc.beginPath();gc.arc(b.x,b.y,b.debris?3:5,0,Math.PI*2);gc.fill();
  });
  gc.globalAlpha=1;
  gRafId=requestAnimationFrame(gLoop);
}
gcEl.addEventListener('click',e=>{const r=gcEl.getBoundingClientRect();gShoot(e.clientX-r.left,e.clientY-r.top);});
gcEl.addEventListener('touchstart',e=>{e.preventDefault();const r=gcEl.getBoundingClientRect(),t2=e.changedTouches[0];gShoot(t2.clientX-r.left,t2.clientY-r.top);},{passive:false});
function startGame(){
  gRunning=true;gSpawn();setTimeout(gSpawn,400);
  document.getElementById('game-ui').style.display='flex';
  gcEl.style.display='block';
  requestAnimationFrame(ts=>{gLastTs=ts;gLoop(ts);});
}

const W=()=>window.innerWidth,H=()=>window.innerHeight;
const delay=ms=>new Promise(r=>setTimeout(r,ms));
function ease(t){return t<0.5?2*t*t:1-(-2*t+2)**2/2;}
function lerp(a,b,t){return a+(b-a)*t;}
const flashEl=document.getElementById('flash');
function doFlash(dur=80,color='#fff'){
  flashEl.style.transition='opacity 0s';flashEl.style.background=color;flashEl.style.opacity='0.85';
  setTimeout(()=>{flashEl.style.transition='opacity 0.25s';flashEl.style.opacity='0';},dur);
}
// ── Audio ──

// ── Audio Utilities ──
let _ctx=null;
function aC(){if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();return _ctx;}
function mkNoise(c,dur){
  const b=c.createBuffer(1,Math.ceil(c.sampleRate*(dur+0.1)),c.sampleRate);
  const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const s=c.createBufferSource();s.buffer=b;return s;
}
function pt(freq,type,delay,dur,vol,dst){ // play tone
  const c=aC(),now=c.currentTime,o=c.createOscillator(),g=c.createGain();
  o.type=type||'sine';o.frequency.setValueAtTime(freq,now+delay);
  g.gain.setValueAtTime(0.001,now+delay);
  g.gain.linearRampToValueAtTime(vol||0.18,now+delay+0.018);
  g.gain.exponentialRampToValueAtTime(0.0001,now+delay+dur);
  o.connect(g);g.connect(dst||c.destination);o.start(now+delay);o.stop(now+delay+dur+0.1);
}
function pn(delay,dur,vol,freq,q,dst){ // play filtered noise
  const c=aC(),now=c.currentTime,s=mkNoise(c,dur),f=c.createBiquadFilter(),g=c.createGain();
  f.type='bandpass';f.frequency.value=freq||800;f.Q.value=q||1;
  g.gain.setValueAtTime(0.001,now+delay);
  g.gain.linearRampToValueAtTime(vol||0.12,now+delay+0.03);
  g.gain.exponentialRampToValueAtTime(0.0001,now+delay+dur);
  s.connect(f);f.connect(g);g.connect(dst||c.destination);s.start(now+delay);
}
function sw(f1,f2,type,delay,dur,vol,dst){ // sweep
  const c=aC(),now=c.currentTime,o=c.createOscillator(),g=c.createGain();
  o.type=type||'sine';o.frequency.setValueAtTime(f1,now+delay);
  o.frequency.exponentialRampToValueAtTime(f2,now+delay+dur);
  g.gain.setValueAtTime(vol||0.18,now+delay);
  g.gain.exponentialRampToValueAtTime(0.0001,now+delay+dur+0.05);
  o.connect(g);g.connect(dst||c.destination);o.start(now+delay);o.stop(now+delay+dur+0.1);
}
function chord(freqs,type,delay,dur,vol){ // chord
  freqs.forEach((f,i)=>pt(f,type||'sine',delay+i*0.04,dur,vol||0.12));
}
function impact(delay,lowVol,midVol){ // physical impact
  const c=aC(),now=c.currentTime;
  // low thud
  const o=c.createOscillator(),g=c.createGain();
  o.type='sine';o.frequency.setValueAtTime(80,now+delay);
  o.frequency.exponentialRampToValueAtTime(30,now+delay+0.15);
  g.gain.setValueAtTime(lowVol||0.3,now+delay);
  g.gain.exponentialRampToValueAtTime(0.001,now+delay+0.25);
  o.connect(g);g.connect(c.destination);o.start(now+delay);o.stop(now+delay+0.3);
  // noise transient
  pn(delay,0.08,midVol||0.2,200,0.8);
}


const snd={
  title:()=>{
    sw(100,800,'sawtooth',0,0.4,0.15); // power-on
    pt(800,'square',0.35,0.3,0.08);
  },
  crash:()=>{
    impact(0,0.35,0.2);
    sw(600,50,'sawtooth',0,0.3,0.2); // descending crash
    pn(0,0.5,0.25,300,0.4);
  },
  dots:()=>{ sw(200,1200,'sine',0,0.5,0.12); pn(0,0.3,0.1,1500,2); },
  particle:()=>{
    // WARP OUT: all fly outward
    sw(200,5000,'sawtooth',0,0.5,0.25); // outward rush
    pn(0,0.6,0.2,800,0.5);
    // Screen clear
    pt(1200,'square',0.6,0.1,0.15);
    // WARP IN: rush from edges
    sw(5000,200,'sawtooth',0.8,0.5,0.2);
    pn(0.8,0.5,0.2,600,0.5);
    pn(1.4,0.3,0.1,1200,2); // arrival shimmer
  },
  reveal:()=>{
    // Power-up chord
    [220,330,440,660].forEach((f,i)=>pt(f,'sawtooth',i*0.03,1.5,0.07));
    sw(110,440,'sine',0,0.4,0.1);
  }
};
// ── Ambient Canvas ──
const sc=document.getElementById('c-amb');const sx=sc.getContext('2d');
sc.width=W();sc.height=H();let starAlpha=0;

const mc=document.getElementById('c-main');const mx=mc.getContext('2d');
const dc=document.getElementById('c-dots');const dx=dc.getContext('2d');
mc.width=W();mc.height=H();dc.width=W();dc.height=H();
function drawPhoto(ctx,alpha,offsetY=0){
  const cw=ctx.canvas.width,ch=ctx.canvas.height;
  const iw=img.naturalWidth,ih=img.naturalHeight;
  const scale=Math.max(cw/iw,ch/ih)*0.9;
  const dw=iw*scale,dh=ih*scale;
  ctx.save();ctx.globalAlpha=alpha;ctx.filter='saturate(0.55) brightness(0.58)';
  ctx.drawImage(img,(cw-dw)/2,(ch-dh)/2+offsetY,dw,dh);ctx.filter='none';
  const gr=ctx.createRadialGradient(cw/2,ch/2,ch*0.15,cw/2,ch/2,ch*0.85);
  gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,'rgba(0,0,0,0.9)');
  ctx.globalAlpha=1;ctx.fillStyle=gr;ctx.fillRect(0,0,cw,ch);ctx.restore();
}
async function run(){
  // ── TITLE ──
  snd.title();
  const tb=document.getElementById('title-block');
  tb.style.opacity='1'; await delay(60);
  document.getElementById('title-name-inner').style.transform='translateY(0)';
  doFlash(60,'#4fc3f7'); await delay(350);
  document.getElementById('title-bar').style.width='140px';
  document.getElementById('title-from').style.opacity='1';
  await delay(1100);
  tb.style.transition='opacity 0.35s ease,transform 0.35s ease';
  tb.style.opacity='0';tb.style.transform='translateY(-28px)';
  await delay(350);tb.style.display='none';
  // ── PHOTO CRASH ──
  mc.width=W();mc.height=H();
  await new Promise(res=>{
    let t=0;function f(){t+=0.05;mx.clearRect(0,0,mc.width,mc.height);
      drawPhoto(mx,Math.min(t*2,1),(1-ease(Math.min(t,1)))*(-mc.height*0.35));
      if(t>=1){res();return;}requestAnimationFrame(f);}f();
  });
  snd.crash(); doFlash(90); await delay(700);
  // ── PHOTO → DOTS ──
  const cw=mc.width,ch=mc.height;
  const CX=cw/2,CY=ch/2;
  const off=document.createElement('canvas');off.width=cw;off.height=ch;
  const ox2=off.getContext('2d');drawPhoto(ox2,1,0);
  const id=ox2.getImageData(0,0,cw,ch);
  const COLS=40,ROWS=Math.round(40*ch/cw);
  const dots=[];
  for(let row=0;row<ROWS;row++)for(let col=0;col<COLS;col++){
    const px=Math.round(col/COLS*cw),py=Math.round(row/ROWS*ch);
    const i=(py*cw+px)*4;if(id.data[i+3]<20)continue;
    dots.push({x:px,y:py,ox:px,oy:py,r:1.8+Math.random()*1.5,cr:id.data[i],cg:id.data[i+1],cb:id.data[i+2],vx:0,vy:0,angle:0,dist:0});
  }
  snd.dots();
  await new Promise(res=>{
    let t=0;function f(){t+=0.04;
      mx.clearRect(0,0,cw,ch);drawPhoto(mx,1-ease(Math.min(t,1)),0);
      dx.clearRect(0,0,cw,ch);const show=ease(Math.min(t*1.3,1));
      dots.forEach(d=>{dx.globalAlpha=show;dx.beginPath();dx.arc(d.x,d.y,d.r,0,Math.PI*2);dx.fillStyle=`rgb(${d.cr},${d.cg},${d.cb})`;dx.fill();});
      if(t>=1){mx.clearRect(0,0,cw,ch);res();return;}requestAnimationFrame(f);}f();
  });
  await delay(300);
  // ── THEME PARTICLE SEQUENCE ──
  
  snd.particle();
  dots.forEach(d=>{ const a=Math.atan2(d.oy-CY,d.ox-CX); const spd=(10+Math.random()*18)*Math.max(cw,ch)*0.004; d.vx=Math.cos(a)*spd; d.vy=Math.sin(a)*spd; });
  doFlash(60,'#4fc3f7');
  await new Promise(res=>{
    let t=0;function f(){
      t+=0.025; dx.clearRect(0,0,cw,ch);
      dots.forEach(d=>{
        d.x+=d.vx; d.y+=d.vy;
        const al=Math.max(0,1-t*1.5);
        dx.globalAlpha=al*0.7; dx.strokeStyle='#4fc3f7'; dx.lineWidth=d.r*0.8;
        dx.beginPath(); dx.moveTo(d.x,d.y); dx.lineTo(d.x-d.vx*5,d.y-d.vy*5); dx.stroke();
        dx.globalAlpha=al; dx.fillStyle=`rgb(${d.cr},${d.cg},${d.cb})`;
        dx.beginPath(); dx.arc(d.x,d.y,d.r,0,Math.PI*2); dx.fill();
      });
      starAlpha=Math.min(t*2,1);
      if(t>=0.9){ dx.clearRect(0,0,cw,ch); res(); return; }
      requestAnimationFrame(f);
    } f();
  });
  dots.forEach(d=>{ const a=Math.random()*Math.PI*2; const dist=Math.max(cw,ch)*0.8; d.x=CX+Math.cos(a)*dist; d.y=CY+Math.sin(a)*dist; d.vx=-Math.cos(a)*(12+Math.random()*8)*Math.max(cw,ch)*0.003; d.vy=-Math.sin(a)*(12+Math.random()*8)*Math.max(cw,ch)*0.003; });
  doFlash(120,'#fff');
  await new Promise(res=>{
    let t=0;function f(){
      t+=0.03; dx.clearRect(0,0,cw,ch);
      dots.forEach(d=>{ d.x+=d.vx*0.9; d.y+=d.vy*0.9; d.vx*=0.85; d.vy*=0.85;
        dx.globalAlpha=Math.min(t*3,0.85); dx.strokeStyle=`rgba(255,255,255,0.35)`; dx.lineWidth=d.r*0.5;
        dx.beginPath(); dx.moveTo(d.x,d.y); dx.lineTo(d.x-d.vx*3,d.y-d.vy*3); dx.stroke();
        dx.fillStyle='#4fc3f7'; dx.globalAlpha=Math.min(t*3,0.85); dx.beginPath(); dx.arc(d.x,d.y,d.r,0,Math.PI*2); dx.fill();
      });
      if(t>=1.0){ dx.clearRect(0,0,cw,ch); res(); return; }
      requestAnimationFrame(f);
    } f();
  });
  await delay(180);
  // ── FINAL TEXT ──
  snd.reveal();
  const fb=document.getElementById('final-block');fb.style.opacity='1'; await delay(80);
  document.getElementById('final-name').style.opacity='1';document.getElementById('final-name').style.transform='translateY(0)';
  await delay(340);
  document.getElementById('final-msg').style.opacity='1';document.getElementById('final-msg').style.transform='translateY(0)';
  await delay(500);
  document.getElementById('final-from').style.opacity='1';
  setTimeout(()=>{const b=document.getElementById('back-btn');if(b){b.style.opacity='1';b.style.pointerEvents='auto';}},1400);
  // ── GHOST PHOTO ──
  await delay(700);
  await new Promise(res=>{
    let t=0;function f(){t+=0.012;mx.clearRect(0,0,cw,ch);
      const iw=img.naturalWidth,ih=img.naturalHeight,scale=Math.max(cw/iw,ch/ih)*0.9,dw=iw*scale,dh=ih*scale;
      mx.save();mx.globalAlpha=ease(Math.min(t,1))*0.3;mx.filter='saturate(0.4) brightness(0.5)';
      mx.drawImage(img,(cw-dw)/2,(ch-dh)/2,dw,dh);mx.filter='none';
      const gr=mx.createRadialGradient(cw/2,ch/2,ch*0.1,cw/2,ch/2,ch*0.9);
      gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,'rgba(0,0,0,0.95)');
      mx.globalAlpha=1;mx.fillStyle=gr;mx.fillRect(0,0,cw,ch);mx.restore();
      if(t>=1){res();return;}requestAnimationFrame(f);}f();
  });
}
// ── TAP TO START ──
const tapOv=document.getElementById('tap-ov');
function startAll(){
  tapOv.style.opacity='0';
  setTimeout(()=>tapOv.style.display='none',600);
  startGame();
}
tapOv.addEventListener('click',startAll,{once:true});
tapOv.addEventListener('touchend',e=>{e.preventDefault();startAll();},{once:true,passive:false});
</script>
